spring:
  application:
    name: ongHub
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ong_manager}
    username: ${DB_USERNAME:ong_user}
    password: ${DB_PASSWORD:change_me_in_production}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@example.com}
    password: ${MAIL_PASSWORD:change_me}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

app:
  storage:
    upload-dir: ${UPLOAD_DIR:./data/uploads}
    public-base-url: ${FILES_PUBLIC_BASE_URL:http://localhost:8080/api/v1/files}
  security:
    jwt:
      secret: ${JWT_SECRET:change_this_to_a_256bit_secret_in_production}
      access-expiration-ms: ${JWT_EXPIRATION_MS:900000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  base-url: ${APP_BASE_URL:http://localhost:5173}

server:
  port: ${PORT:8080}
  error:
    include-message: always
